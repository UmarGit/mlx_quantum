name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14  # Apple Silicon runner (MLX requires arm64)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: uv build
